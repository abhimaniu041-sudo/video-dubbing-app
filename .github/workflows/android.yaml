name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: Create PNG assets
        run: python3 scripts/make_assets.py

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOCTOR: 1
          CI: 1

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Create JS Bundle
        run: |
          mkdir -p android/app/src/main/assets
          npx expo export:embed \
            --platform android \
            --output-dir android/app/src/main/assets \
            --dev false
        env:
          CI: 1
          NODE_ENV: production

      - name: Create Keystore
        run: |
          cd android/app
          keytool -genkeypair \
            -v \
            -keystore release.keystore \
            -alias releasekey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=VideoDubber,O=App,C=IN"

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            --no-daemon \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m" \
            -PMYAPP_RELEASE_STORE_FILE=release.keystore \
            -PMYAPP_RELEASE_KEY_ALIAS=releasekey \
            -PMYAPP_RELEASE_STORE_PASSWORD=password123 \
            -PMYAPP_RELEASE_KEY_PASSWORD=password123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: VideoDubber-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Done
        run: echo "APK ready! Download from Artifacts."
