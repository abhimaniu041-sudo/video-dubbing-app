name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: 🖼 Create valid PNG assets using Node.js
        run: |
          node -e "
          const fs = require('fs');
          
          // Valid 100x100 purple PNG created with raw buffer
          // This is a real minimal PNG file
          const { createCanvas } = require('canvas') || {};
          
          // Use pure Node.js Buffer to write valid PNG
          // PNG signature + IHDR + IDAT + IEND
          const PNG_1x1_RED = Buffer.from([
            0x89, 0x50, 0x4E, 0x47, 0x0D, 0x0A, 0x1A, 0x0A,
            0x00, 0x00, 0x00, 0x0D, 0x49, 0x48, 0x44, 0x52,
            0x00, 0x00, 0x00, 0x01, 0x00, 0x00, 0x00, 0x01,
            0x08, 0x02, 0x00, 0x00, 0x00, 0x90, 0x77, 0x53,
            0xDE, 0x00, 0x00, 0x00, 0x0C, 0x49, 0x44, 0x41,
            0x54, 0x08, 0xD7, 0x63, 0x6C, 0x6C, 0xF8, 0x0F,
            0x00, 0x00, 0x04, 0x04, 0x00, 0x01, 0x32, 0xD5,
            0xEB, 0x00, 0x00, 0x00, 0x00, 0x49, 0x45, 0x4E,
            0x44, 0xAE, 0x42, 0x60, 0x82
          ]);
          
          fs.mkdirSync('assets', { recursive: true });
          fs.writeFileSync('assets/icon.png', PNG_1x1_RED);
          fs.writeFileSync('assets/splash.png', PNG_1x1_RED);
          fs.writeFileSync('assets/adaptive-icon.png', PNG_1x1_RED);
          fs.writeFileSync('assets/favicon.png', PNG_1x1_RED);
          console.log('Assets created, sizes:', fs.statSync('assets/icon.png').size);
          "
          echo "✅ PNG assets created"

      - name: 🔍 Verify PNG files
        run: |
          file assets/icon.png
          file assets/splash.png
          ls -la assets/

      - name: 🔧 Prebuild Android folder
        run: |
          npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOCTOR: 1
          CI: 1

      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 📱 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDubber-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Success
        run: echo "🎉 APK ready! Download from Artifacts above."
