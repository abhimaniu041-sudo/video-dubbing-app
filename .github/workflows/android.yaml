name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 🏗 Checkout repository
        uses: actions/checkout@v4

      - name: 🏗 Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps --no-package-lock

      - name: 🖼 Create valid PNG assets using Python
        run: |
          mkdir -p assets
          python3 - <<'EOF'
import struct
import zlib

def make_png(width=100, height=100, r=108, g=99, b=255):
    def chunk(name, data):
        c = name + data
        return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
    
    sig = b'\x89PNG\r\n\x1a\n'
    ihdr_data = struct.pack('>IIBBBBB', width, height, 8, 2, 0, 0, 0)
    ihdr = chunk(b'IHDR', ihdr_data)
    
    raw = b''
    for y in range(height):
        raw += b'\x00'
        for x in range(width):
            raw += bytes([r, g, b])
    
    compressed = zlib.compress(raw)
    idat = chunk(b'IDAT', compressed)
    iend = chunk(b'IEND', b'')
    
    return sig + ihdr + idat + iend

png = make_png()
for name in ['assets/icon.png', 'assets/splash.png', 'assets/adaptive-icon.png', 'assets/favicon.png']:
    with open(name, 'wb') as f:
        f.write(png)
    print(f'Created {name}: {len(png)} bytes')
EOF
          echo "✅ PNG assets created"
          file assets/icon.png

      - name: 🔧 Prebuild Android folder
        run: |
          npx expo prebuild --platform android --clean
        env:
          EXPO_NO_DOCTOR: 1
          CI: 1

      - name: 🔑 Make gradlew executable
        run: chmod +x android/gradlew

      - name: 📱 Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx3072m -XX:MaxMetaspaceSize=512m"

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VideoDubber-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: ✅ Done
        run: echo "🎉 APK ready! Download from Artifacts above."
